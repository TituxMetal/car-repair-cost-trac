app = "car-repair-api"
primary_region = "cdg"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_URL = "file:///data/prod.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/health"

[mounts]
  source = "data"
  destination = "/data"
